aid: bandsintown
name: Bandsintown
description: >
  Bandsintown is a concert discovery platform that connects fans with live music events
  through a REST API for accessing artist event listings, venue information, and fan
  notification management. The platform serves as the largest database of upcoming
  concert listings and concert tickets, enabling artists, developers, and partners to
  display tour dates, retrieve artist metadata, filter events by date range, and drive
  fan engagement through RSVP and notification tracking. API access requires an app_id
  parameter obtained through the Bandsintown for Artists account settings or via a
  partnership request for broader integration use cases.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - concerts
  - live music
  - events
  - artists
  - venues
  - music discovery
  - tour dates
  - tickets
  - fan notifications
  - entertainment
url: https://raw.githubusercontent.com/api-evangelist/bandsintown/refs/heads/main/apis.yml
created: '2026-05-28'
modified: '2026-06-13'
specificationVersion: '0.19'

apis:

  - aid: bandsintown:public-api
    name: Bandsintown Public API
    description: >
      The Bandsintown Public API (v3) provides REST endpoints for retrieving artist
      information and event listings. Developers can look up artists by name, Bandsintown
      ID, or Facebook page ID, retrieve upcoming, past, or date-range-filtered event
      listings, and access venue details including name, city, region, country, and
      geographic coordinates. All requests require an app_id query parameter for
      authentication. Event responses include lineup, ticket offer URLs, RSVP links,
      and venue metadata. The API supports engagement tracking via trigger parameters
      for RSVP, notify-me, and track actions.
    humanURL: https://help.artists.bandsintown.com/en/articles/9186477-api-documentation
    baseURL: https://rest.bandsintown.com
    tags:
      - artists
